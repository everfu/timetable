name: jvtus_timetable
description: "江软课 - 江西软件职业技术大学课表"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  excel: ^4.0.6
  excel2003: ^1.0.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  file_picker: ^8.1.6
  path: ^1.9.1
  tdesign_flutter: ^0.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#4A90D9"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  adaptive_icon_round: "assets/icon_round.png"

flutter:
  uses-material-design: true
